name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: docker build -t 3d-decimator:test .
    
    - name: Test container starts
      run: |
        docker run -d --name test-container -p 8000:8000 3d-decimator:test
        sleep 5
        curl -f http://localhost:8000/health || exit 1
    
    - name: Cleanup
      run: docker stop test-container && docker rm test-container
